name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        # Non-blocking on lint errors in CI for now — change to `run: npm run lint` to enforce
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify shebang in built output
        run: head -1 dist/cli.js | grep -q '#!/usr/bin/env node'
